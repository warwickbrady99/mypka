<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- interactive-widget=resizes-content: Android Chrome shrinks the layout viewport
         (and dvh) when the on-screen keyboard opens — a free pure-CSS solve there; ignored
         (harmless) on iOS, which uses the useKeyboardInset JS path. viewport-fit=cover makes
         env(safe-area-inset-*) resolve to real values so the composer's safe-area-bottom
         padding works on notched devices (latent bug fix). -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="color-scheme" content="light dark" />
    <title>myPKA Cockpit</title>
    <!-- Theme bootstrap — runs BEFORE the stylesheet/app so the correct token set
         is on <html> at first paint (no flash of the wrong theme). Mirrors
         src/lib/theme.ts: read the 'cockpit-theme' preference, resolve 'system'
         via prefers-color-scheme, set data-theme + color-scheme on the root.
         EXTERNAL (not inline) on purpose: the server serves the SPA under a strict
         `script-src 'self'` CSP that blocks inline scripts. /theme-bootstrap.js is a
         same-origin 'self' asset the CSP already permits (no nonce / no per-build hash
         to drift). Vite copies web/public/theme-bootstrap.js to the dist root verbatim;
         a plain (non-module) <script> in <head> runs it synchronously before first
         paint, exactly as the old inline script did. -->
    <script src="/theme-bootstrap.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,370;14..32,460;14..32,520;14..32,600&family=JetBrains+Mono:wght@400;500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;1,8..60,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
