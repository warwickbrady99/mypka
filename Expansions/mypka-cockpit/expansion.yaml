name: myPKA Cockpit
slug: mypka-cockpit
version: 1.2.1
description: A navigable, wikilink-aware viewer over your whole myPKA — reads mypka.db read-only and renders the My Life hub, journal, note viewer with backlinks, team roster, Fleeting Notes with an outliner editor and whiteboards, finance/invoice modules, a read-only day planner, and optional health/workout packs. Runs entirely on your machine; nothing leaves it.
category: productivity
expansion_type: runtime
requires_agents: [Larry, Mack, Silas]
license: PolyForm-Noncommercial-1.0.0
author: myICOR
homepage: https://myicor.com/library/mypka-cockpit

adds_agents: []
adds_sops: []
adds_guidelines: []
adds_workstreams: []
adds_templates: []

mcp_servers: []

env_vars:
  - { key: MYPKA_ROOT,              description: "Absolute path to the scaffold root. Leave UNSET for auto-detection (server/repoRoot.js resolves it). Set only for a relocated cockpit or a scaffold on another volume.", required: false, sensitive: false }
  - { key: PORT,                    description: "TCP port the cockpit binds. Default 4317.",                                                                     required: false, sensitive: false }
  - { key: CONNECTORS_ENABLED,      description: "1 admits the example task/PM/calendar connectors (Todoist/ClickUp/iCal/IMAP); each still activates only when its key resolves. Default off — connectors ship as disabled example source.", required: false, sensitive: false }
  - { key: COCKPIT_BIND_LAN,        description: "1 binds 0.0.0.0 so your own phone/tablet on your own network can reach the cockpit. HARD-GATED on a configured PIN — refuses to start without one.",      required: false, sensitive: false }
  - { key: WORKBENCH_WRITE_ENABLED, description: "1 enables the Fleeting Notes editor + whiteboards (writes only under PKM/Fleeting Notes/). The launcher defaults this to 1; set 0 for a fully read-only cockpit.", required: false, sensitive: false }
  - { key: PLAN_WRITE_ENABLED,      description: "1 enables saving the day-planner's LOCAL plan layout (mypka-cockpit.db — like browser storage, never the vault, never an external tool). The launcher defaults this to 1.", required: false, sensitive: false }
  - { key: COCKPIT_PIN_HASH,        description: "scrypt hash of the access PIN (never the cleartext PIN). Set it with `npm run set-pin` — written to Team Knowledge/.env.",                                 required: false, sensitive: true }
  - { key: COCKPIT_USE_TLS,         description: "1 serves HTTPS and marks the session cookie Secure. Needs COCKPIT_TLS_CERT + COCKPIT_TLS_KEY.",                  required: false, sensitive: false }
  - { key: COCKPIT_TLS_CERT,        description: "Path to a TLS certificate (only with COCKPIT_USE_TLS=1).",                                                       required: false, sensitive: false }
  - { key: COCKPIT_TLS_KEY,         description: "Path to the TLS private key (only with COCKPIT_USE_TLS=1).",                                                     required: false, sensitive: true }

post_install_steps:
  - "Point your LLM assistant at INSTALL.md and say: install the myPKA Cockpit. INSTALL.md is the step-by-step contract it follows."
  - "Step 0 surfaces DISCLAIMER.md and stops for your consent; Step 1 makes you back up first. No write happens before both clear."
  - "Confirm prerequisites: Node.js v20+ and Python 3 with PyYAML (pip3 install --user pyyaml) for the mypka.db regen."
  - "Your assistant runs sqlite-extension/detect-gaps.py, reports which modules will be empty on your scaffold, and OFFERS (never auto-runs) the SQLite upgrade."
  - "Your assistant generates an OS-appropriate launcher from launcher/GENERATE-LAUNCHER.md — NO launcher ships in this package. You start the cockpit; it never auto-launches."
  - "Optional: set an access PIN with `npm run set-pin` (required only for LAN mode). Connectors are OFF by default — enable with CONNECTORS_ENABLED=1 plus a stored key, a separate decision."

post_install_validation:
  - { type: "file_exists", path: "INSTALL.md" }
  - { type: "file_exists", path: "server/server.js" }
  - { type: "file_exists", path: "web/index.html" }
  - { type: "file_exists", path: "sqlite-extension/DATA-CONTRACT.md" }
  - { type: "file_exists", path: "launcher/GENERATE-LAUNCHER.md" }

runtime:
  start:
    command: null      # NO shipped launcher — generated per-OS by the install LLM (launcher/GENERATE-LAUNCHER.md)
    sh: null
    bat: null
  launchd_plist: null
  port: 4317
  interactive: true

uninstall:
  method: rm-rf-folder
  residual_paths:
    - mypka.db                       # derived scaffold mirror (SOP-002 layer) — regenerable; keep unless going markdown-only again
    - mypka-cockpit.db               # cockpit-owned planner + settings state (local, like browser storage) — keep if you want your layout
    - "PKM/Fleeting Notes/"          # the user's own notes + whiteboards — NEVER delete without explicit approval
    - "Team Knowledge/.env"          # may carry the COCKPIT_PIN_HASH + connector keys — remove just those lines
